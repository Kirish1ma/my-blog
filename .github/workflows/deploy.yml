name: GitHub Pages

on:
  push:
    branches:
      - main # 或你要部署的分支

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 仓库
      - uses: actions/checkout@v4

      # 2. 设置 Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3. 安装 pnpm
      - run: npm install -g pnpm

      # 4. 安装依赖
      - run: pnpm install

      # 5. 构建站点（11ty）
      - run: pnpm exec @11ty/eleventy

      # 6. 上传构建产物到 GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # 7. 部署 Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
